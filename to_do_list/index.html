<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Planner Aesthetic Duck</title>
    <style>
        /* CSS LANGSUNG DI SINI */
        :root {
            --bg-page: #fffdf0;
            --card-yellow: #fff9c4;
            --accent-orange: #ffb74d;
            --text-brown: #5d4037;
            --header-cloud: #fffde7;
        }

        body {
            background-color: var(--bg-page);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: var(--text-brown);
        }

        .planner-container {
            width: 90%;
            max-width: 500px;
            background: white;
            padding: 30px;
            border-radius: 40px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            position: relative;
        }

        /* Header Section */
        .header {
            text-align: center;
            margin-bottom: 20px;
            position: relative;
        }

        .header h1 {
            background: var(--header-cloud);
            display: inline-block;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 24px;
            letter-spacing: 2px;
            margin: 0;
            border: 2px solid rgba(0,0,0,0.05);
        }

        .duck-icon {
            font-size: 40px;
            position: absolute;
            right: 10px;
            top: -10px;
        }

        .sparkle {
            position: absolute;
            color: #fdd835;
            font-size: 20px;
        }

        /* Name Input */
        .name-section {
            background: #ffe082;
            padding: 12px 20px;
            border-radius: 25px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            font-weight: bold;
        }

        .name-section input {
            background: transparent;
            border: none;
            outline: none;
            margin-left: 10px;
            flex-grow: 1;
            font-family: inherit;
            font-size: 16px;
        }

        /* Main Grid */
        .grid-layout {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 15px;
        }

        .card {
            background: var(--card-yellow);
            border-radius: 25px;
            padding: 15px;
            position: relative;
        }

        h2 {
            font-size: 16px;
            margin-top: 0;
            margin-bottom: 10px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        /* To Do List */
        .todo-box {
            grid-row: span 2;
            min-height: 350px;
        }

        .todo-input-group {
            display: flex;
            gap: 5px;
            margin-bottom: 10px;
        }

        #new-task {
            width: 100%;
            border: none;
            border-radius: 10px;
            padding: 8px;
            font-size: 12px;
        }

        #add-task-btn {
            background: var(--text-brown);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            padding: 0 10px;
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        li {
            font-size: 14px;
            padding: 6px 0;
            border-bottom: 1px dashed #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .completed {
            text-decoration: line-through;
            opacity: 0.5;
        }

        /* Goals & Notes */
        textarea {
            width: 100%;
            height: 100px;
            background: transparent;
            border: none;
            resize: none;
            outline: none;
            font-family: inherit;
            font-size: 14px;
        }

        .tape {
            width: 50px;
            height: 15px;
            background: rgba(255, 138, 101, 0.4);
            position: absolute;
            top: -5px;
            left: 50%;
            transform: translateX(-50%);
        }

        .decor-bottom {
            position: absolute;
            bottom: 10px;
            right: 10px;
            font-size: 20px;
        }

        .duck-bottom {
            font-size: 60px;
            position: absolute;
            bottom: -10px;
            left: 10px;
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="planner-container">
        <div class="sparkle" style="top:20px; left:20px;">✧</div>
        <div class="sparkle" style="top:50px; left:40px;">✦</div>

        <header class="header">
            <h1>DAILY PLANNER</h1>
            <div class="duck-icon">🐤</div>
        </header>

        <div class="name-section">
            NAME: <input type="text" placeholder="...">
        </div>

        <div class="grid-layout">
            <div class="card todo-box">
                <h2>TO DO LIST:</h2>
                <div class="todo-input-group">
                    <input type="text" id="new-task" placeholder="Tambah kegiatan...">
                    <button id="add-task-btn">+</button>
                </div>
                <ul id="todo-list">
                    </ul>
                <div class="decor-bottom">🦋</div>
            </div>

            <div style="display: flex; flex-direction: column; gap: 15px;">
                <div class="card">
                    <div class="tape"></div>
                    <h2>GOALS:</h2>
                    <textarea placeholder="Tulis tujuanmu..."></textarea>
                </div>

                <div class="card">
                    <h2>NOTES:</h2>
                    <textarea placeholder="Catatan kecil..."></textarea>
                    <div class="decor-bottom">🥕</div>
                </div>
            </div>
        </div>

        <div class="duck-bottom">🐥</div>
    </div>

    <script>
        // JAVASCRIPT LANGSUNG DI SINI
        const input = document.getElementById('new-task');
        const btn = document.getElementById('add-task-btn');
        const list = document.getElementById('todo-list');

        btn.addEventListener('click', function() {
            if (input.value.trim() !== "") {
                const li = document.createElement('li');
                li.innerHTML = `
                    <span>${input.value}</span>
                    <button onclick="this.parentElement.remove()" style="background:none; border:none; color:red; cursor:pointer;">✕</button>
                `;
                
                // Fitur klik untuk coret (selesai)
                li.addEventListener('click', function(e) {
                    if(e.target.tagName !== 'BUTTON') {
                        this.classList.toggle('completed');
                    }
                });

                list.appendChild(li);
                input.value = "";
            } else {
                alert("Isi tugas dulu ya!");
            }
        });

        // Bisa tambah pake tombol Enter
        input.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                btn.click();
            }
        });
    </script>
</body>
</html>
